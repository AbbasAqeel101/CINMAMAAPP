name: Build iOS

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build & Archive
      run: |
        # بناء الأرشيف مع تجاهل أخطاء التوقيع
        xcodebuild archive \
          -project CinemanaApp.xcodeproj \
          -scheme CinemanaApp \
          -sdk iphoneos \
          -configuration Release \
          -archivePath ./build/CinemanaApp.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          PRODUCT_BUNDLE_IDENTIFIER="com.cinemana.app"

    - name: Package IPA
      run: |
        mkdir -p Payload
        
        # البحث عن ملف الـ .app الحقيقي أينما كان داخل الأرشيف
        APP_PATH=$(find ./build/CinemanaApp.xcarchive -name "*.app" -type d | head -1)
        
        if [ -z "$APP_PATH" ]; then
          echo "❌ Error: No .app bundle found in archive!"
          exit 1
        fi
        
        echo "✅ Found App at: $APP_PATH"
        cp -r "$APP_PATH" Payload/
        
        # ضغط المجلد
        zip -r CinemanaApp.ipa Payload
        
        # طباعة الحجم النهائي للتأكد
        echo "📊 Final IPA Size:"
        ls -lh CinemanaApp.ipa