name: Build iOS

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build & Package IPA
      run: |
        xcodebuild \
          -project CinemanaApp.xcodeproj \
          -scheme CinemanaApp \
          -sdk iphoneos \
          -configuration Release \
          -derivedDataPath DerivedData \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="" \
          build

        APP_PATH=$(find DerivedData -name "*.app" | head -1)
        echo "Found app at: $APP_PATH"
        ls -lh "$APP_PATH"

        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        zip -r CinemanaApp.ipa Payload
        ls -lh CinemanaApp.ipa

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: CinemanaApp-IPA
        path: CinemanaApp.ipa
        retention-days: 7