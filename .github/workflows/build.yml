name: Build iOS

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build IPA
      run: |
        xcodebuild \
          -project CinemanaApp.xcodeproj \
          -scheme CinemanaApp \
          -sdk iphoneos \
          -configuration Release \
          -archivePath build/CinemanaApp.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          archive

        mkdir -p build/ipa
        cp -r build/CinemanaApp.xcarchive/Products/Applications/CinemanaApp.app build/ipa/
        cd build/ipa && zip -r ../CinemanaApp.ipa .

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: CinemanaApp-IPA
        path: build/CinemanaApp.ipa