name: Build iOS

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build
      run: |
        xcodebuild \
          -project CinemanaApp.xcodeproj \
          -scheme CinemanaApp \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          build
