name: Build iOS

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Create project.yml
      run: |
        cat > project.yml << 'EOF'
        name: CinemanaApp
        options:
          bundleIdPrefix: com.cinemana
          deploymentTarget:
            iOS: "16.0"
        targets:
          CinemanaApp:
            type: application
            platform: iOS
            sources:
              - path: .
                excludes:
                  - .github/**
                  - Package.swift
                  - project.yml
                  - README.md
            settings:
              base:
                PRODUCT_BUNDLE_IDENTIFIER: com.cinemana.app
                SWIFT_VERSION: 5.9
                IPHONEOS_DEPLOYMENT_TARGET: 16.0
                GENERATE_INFOPLIST_FILE: YES
                MARKETING_VERSION: 1.0
                CURRENT_PROJECT_VERSION: 1
                INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
                INFOPLIST_KEY_UILaunchScreen_Generation: YES
        EOF

    - name: Generate Xcode project
      run: xcodegen generate

    - name: Build
      run: |
        xcodebuild \
          -project CinemanaApp.xcodeproj \
          -scheme CinemanaApp \
          -sdk iphoneos \
          -configuration Release \
          CODE_SIGNING_ALLOWED=NO \
          build

    - name: Create IPA
      run: |
        mkdir Payload
        cp -r ~/Library/Developer/Xcode/DerivedData/CinemanaApp-*/Build/Products/Release-iphoneos/CinemanaApp.app Payload/
        zip -r CinemanaApp.ipa Payload

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: CinemanaApp-IPA
        path: CinemanaApp.ipa