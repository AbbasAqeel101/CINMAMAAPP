name: Build iOS

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Build & Archive
      run: |
        # بناء الأرشيف لضمان تجميع كل الملفات
        xcodebuild archive \
          -project CinemanaApp.xcodeproj \
          -scheme CinemanaApp \
          -sdk iphoneos \
          -configuration Release \
          -archivePath ./build/CinemanaApp.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_IDENTITY=""

    - name: Package IPA
      run: |
        # إنشاء هيكلية الـ Payload المتعارف عليها في iOS
        mkdir -p Payload
        
        # نسخ التطبيق الفعلي من داخل الأرشيف المترجم
        cp -r ./build/CinemanaApp.xcarchive/Products/Applications/*.app Payload/
        
        # ضغط المجلد لإنتاج ملف IPA حقيقي
        zip -r CinemanaApp.ipa Payload
        
        # التحقق من الحجم (يجب أن يكون بالميغابايت الآن)
        ls -lh CinemanaApp.ipa

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: CinemanaApp-IPA
        path: CinemanaApp.ipa
        retention-days: 7