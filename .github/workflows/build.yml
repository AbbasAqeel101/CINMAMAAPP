name: Build iOS

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4

    - name: Archive
      run: |
        xcodebuild \
          -project CinemanaApp.xcodeproj \
          -scheme CinemanaApp \
          -sdk iphoneos \
          -configuration Release \
          -archivePath $PWD/build/CinemanaApp.xcarchive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          archive

    - name: Export IPA
      run: |
        mkdir -p $PWD/build/ipa/Payload
        cp -r $PWD/build/CinemanaApp.xcarchive/Products/Applications/CinemanaApp.app \
              $PWD/build/ipa/Payload/CinemanaApp.app
        cd $PWD/build/ipa
        zip -r ../CinemanaApp.ipa Payload

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: CinemanaApp-IPA
        path: build/CinemanaApp.ipa
        retention-days: 7